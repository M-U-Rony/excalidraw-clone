name: Learning CI

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.19.0'

    - name: Install dependencies
      run: npm install
    
    - name: Install pnpm
      run: npm install -g pnpm

    - name: Run Build
      run: pnpm build