name: Learning CD

on:
  workflow_run:
    workflows: ["Learning CI"]
    types:
      - completed

jobs:
  deploy-to-hostinger:
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'}}

    steps:
    - name: Deploy via SSH to VM
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        passphrase: ${{ secrets.SSH_PASSPHRASE }}
        port: 22
        script: |
          # 1. Load NVM (Node Version Manager) if installed
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

          # 2. Load PNPM path if installed via standalone script
          export PNPM_HOME="$HOME/.local/share/pnpm"
          export PATH="$PNPM_HOME:$PATH"

          # 3. Rest of your deployment script
          cd excalidraw-clone
          git reset --hard
          git pull origin main
          pnpm install --production=false
          cd packages/db && pnpm exec prisma generate && pnpm exec prisma db push && cd ../..
          pnpm run build
          pm2 restart all
